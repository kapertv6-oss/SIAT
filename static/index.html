<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakka AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
--accent:#ff8c00;
--bg:#050506;
--card:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);color:white;height:100vh;overflow:hidden;position:relative;}
body::before{content:"";position:fixed;top:-20%;left:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(255,140,0,0.35) 0%,transparent 70%);filter:blur(90px);z-index:-1;}
header{padding:16px;text-align:center;font-weight:800;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);box-shadow:0 0 10px rgba(255,140,0,0.2);}
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;padding:20px 20px 90px;animation:fadeScreen .35s ease;}
.screen.active{display:flex;}
@keyframes fadeScreen{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero-card{display:flex;align-items:center;padding:16px;margin-bottom:12px;background: rgba(255,255,255,0.05);border-radius:20px;cursor:pointer;transition:.3s;justify-content:space-between;backdrop-filter: blur(10px);}
.hero-card:hover{transform:translateY(-5px);box-shadow:0 0 20px rgba(255,140,0,0.5);border:1px solid rgba(255,140,0,0.6);}
.hero-avatar{width:50px;height:50px;border-radius:14px;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 10px rgba(255,140,0,0.2);}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:90px;}
.bubble{padding:12px 16px;border-radius:18px;max-width:85%;background:#1a1a1c;animation:msgIn .25s ease;display:flex;align-items:center;gap:8px;word-break:break-word;}
.bubble-user{align-self:flex-end;background:var(--accent);color:black;font-weight:600;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modern-input{width:100%;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:16px;color:white;margin-bottom:12px;outline:none;}
.btn{
  background: linear-gradient(135deg, #ff8c00, #ffb347);
  border:none;
  padding:16px;
  border-radius:18px;
  font-weight:800;
  cursor:pointer;
  color:black;
  transition:.3s;
  box-shadow:0 5px 15px rgba(255,140,0,.4);
}
.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,140,0,.8);
}
.nav-bar{position:fixed;bottom:0;left:0;right:0;height:70px;background:rgba(10,10,12,0.9);border-top:1px solid rgba(255,255,255,0.05);display:flex;backdrop-filter:blur(20px);box-shadow:0 -5px 20px rgba(255,140,0,0.1);}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#555;font-weight:700;transition:.2s;}
.nav-item:active{transform:scale(.9);}
.nav-item.active{color:var(--accent);text-shadow:0 0 10px rgba(255,140,0,0.7);}
.typing-bubble{display:flex;gap:5px;align-items:center;padding:12px 16px;border-radius:18px;background:#1a1a1c;width:60px;}
.typing-dot{width:6px;height:6px;background:#aaa;border-radius:50%;animation:typingBounce 1s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%{transform:translateY(0)}40%{transform:translateY(-6px)}80%{transform:translateY(0)}100%{transform:translateY(0)}}
#chat-input-box{display:flex;gap:10px;align-items:center;padding:10px;position:sticky;bottom:70px;background:rgba(5,5,6,0.9);backdrop-filter:blur(10px);}
#chat-input-box input{padding:14px 16px;}
#chat-input-box button{padding:14px 18px;}
</style>
</head>
<body>
<header id="h-title">HAKKA AI</header>

<!-- HEROES -->
<div id="scr-heroes" class="screen active">
<input id="search-input" class="modern-input" placeholder="Поиск персонажа">
<div id="hero-list"></div>
</div>

<!-- CHAT -->
<div id="scr-chat" class="screen">
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<div onclick="nav('scr-heroes')" style="color:orange;cursor:pointer;">⬅</div>
<div id="chat-hero-name">ЧАТ</div>
<div onclick="clearChat()" style="color:#555;cursor:pointer;">очистить</div>
</div>
<div id="chat-messages" class="chat-msgs"></div>
<div id="chat-input-box">
  <input id="chat-input" class="modern-input" placeholder="Введите сообщение...">
  <button class="btn" onclick="sendMessage()">🚀</button>
</div>
</div>

<!-- ADMIN -->
<div id="scr-admin" class="screen">
<div id="admin-box" style="display:none">
<input id="adm-name" class="modern-input" placeholder="Имя персонажа">
<textarea id="adm-desc" class="modern-input" placeholder="Описание/Промпт"></textarea>
<input type="file" id="adm-file" onchange="previewHeroImg(event)">
<div id="adm-prev" style="width:80px;height:80px;border-radius:20px;background-size:cover;margin-bottom:10px"></div>
<button class="btn" onclick="saveHero()">Сохранить</button>
</div>
<div id="no-admin">🔒 доступ закрыт</div>
</div>

<!-- PROFILE -->
<div id="scr-profile" class="screen" style="text-align:center;padding-top:40px;">
<label style="cursor:pointer;display:block;margin-bottom:15px;">
<div id="p-avatar" style="width:120px;height:120px;border-radius:30px;background:#222;margin:auto;background-size:cover"></div>
<input type="file" id="avatar-upload" style="display:none" onchange="changeAvatar(event)">
</label>
<div style="margin-bottom:8px;font-size:14px;color:#aaa;">Ваш ID:</div>
<div id="my-id" style="margin-bottom:20px;font-weight:700;font-size:16px;color:var(--accent)">ID: ---</div>
<input id="user-nickname" class="modern-input" style="width:220px;margin:auto;text-align:center;margin-bottom:10px;" placeholder="Введите никнейм">
<div id="user-role" style="margin-top:6px;font-size:13px"></div>
</div>

<!-- NAV -->
<nav class="nav-bar">
<div class="nav-item active" onclick="nav('scr-heroes',this)">Персонажи</div>
<div class="nav-item" onclick="nav('scr-admin',this)">Админ</div>
<div class="nav-item" onclick="nav('scr-profile',this)">Профиль</div>
</nav>

<script>
const tg = window.Telegram?.WebApp;
const API_URL = "http://127.0.0.1:3000"; // локальный сервер, поменяй на ngrok когда нужно
const USER_ROLES = {6625239442:{title:"Владелец проекта",color:"#ff3b3b"},7652697216:{title:"Разработчик",color:"#3b8cff"}};
const ADMIN_IDS = Object.keys(USER_ROLES).map(Number);

let MY_ID = 0, heroes = [], currentHero = null, selectedIdx = null, tempImg = "", typingElement = null;
let userName = localStorage.getItem("h_username") || "Пользователь";

function initTelegram(){
  if(!tg) return;
  tg.ready(); tg.expand();
  if(tg.initDataUnsafe?.user){
    MY_ID = tg.initDataUnsafe.user.id;
    userName = tg.initDataUnsafe.user.first_name || userName;
  }
  updateUI();
}

/* NAV */
function nav(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(el){document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active")); el.classList.add("active");}
  updateUI();
}

/* HEROES */
async function loadHeroes(){
  try{
    const r = await fetch(`${API_URL}/api/characters`);
    heroes = await r.json();
    renderHeroes();
  }catch(e){console.log("offline", e)}
}

function renderHeroes(){
  const list = document.getElementById("hero-list");
  const isAdm = ADMIN_IDS.includes(Number(MY_ID));
  list.innerHTML = heroes.map((h,i)=>`
    <div class="hero-card">
      <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer" onclick="openHero(${i})">
        <div class="hero-avatar" style="background-image:url(${h.img})"></div>
        <b>${h.name}</b>
      </div>
      ${isAdm?`<div style="display:flex;gap:10px">
        <span onclick="editHero(${i});event.stopPropagation()" style="cursor:pointer">✏️</span>
        <span onclick="deleteHero(${i});event.stopPropagation()" style="cursor:pointer">🗑</span>
      </div>`:""}
    </div>`).join("");
}

function openHero(i){
  selectedIdx = i;
  currentHero = heroes[i];
  document.getElementById("chat-hero-name").innerText = currentHero.name;
  nav("scr-chat");
  loadHistory();
}

/* CHAT */
function showTyping(){
  const chat = document.getElementById("chat-messages");
  typingElement = document.createElement("div");
  typingElement.className = "typing-bubble";
  typingElement.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
  chat.appendChild(typingElement);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping(){ if(typingElement){typingElement.remove(); typingElement=null;} }

async function sendMessage(){
  const inp = document.getElementById("chat-input");
  const txt = inp.value.trim();
  if(!txt || !currentHero) return;
  addMsg(txt,'user'); inp.value=''; showTyping();
  try{
    const r = await fetch(`${API_URL}/api/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message: txt,
        charName: currentHero.name,
        userId: MY_ID,
        userName: userName
      })
    });
    const d = await r.json(); hideTyping();
    addMsg(d.reply,'bot');
  }catch(e){ hideTyping(); addMsg("Ошибка связи",'bot'); console.log(e);}
}

function addMsg(t,s){
  const c = document.getElementById("chat-messages");
  const d = document.createElement("div");
  d.className = `bubble bubble-${s}`;
  d.innerText = t;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function clearChat(){document.getElementById("chat-messages").innerHTML="";}

/* ADMIN */
function previewHeroImg(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{tempImg = r.result; document.getElementById("adm-prev").style.backgroundImage = `url(${tempImg})`;}
  r.readAsDataURL(file);
}

async function saveHero(){
  const name = document.getElementById("adm-name").value;
  const desc = document.getElementById("adm-desc").value;
  if(!name||!tempImg) return;
  const payload = {adminId:MY_ID, character:{name,desc,img:tempImg}};
  if(selectedIdx !== null) payload.index = selectedIdx;
  const r = await fetch(`${API_URL}/api/characters`,{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
  });
  document.getElementById("adm-name").value='';
  document.getElementById("adm-desc").value='';
  document.getElementById("adm-prev").style.backgroundImage='';
  tempImg = ''; selectedIdx=null;
  loadHeroes();
}

async function deleteHero(i){
  if(!confirm("Удалить персонажа?")) return;
  await fetch(`${API_URL}/api/characters/${i}?adminId=${MY_ID}`,{method:'DELETE'});
  loadHeroes();
}
function editHero(i){
  const hero = heroes[i];
  document.getElementById("adm-name").value = hero.name;
  document.getElementById("adm-desc").value = hero.desc;
  tempImg = hero.img;
  document.getElementById("adm-prev").style.backgroundImage = `url(${hero.img})`;
  selectedIdx = i;
  nav("scr-admin");
}

/* PROFILE */
function changeAvatar(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{const img=r.result; localStorage.setItem("user_avatar",img); document.getElementById("p-avatar").style.backgroundImage = `url(${img})`;}
  r.readAsDataURL(file);
}

function updateUI(){
  document.getElementById("my-id").innerText = `ID: ${MY_ID}`;
  document.getElementById("user-nickname").value = userName;
  const roleBox = document.getElementById("user-role");
  if(USER_ROLES[MY_ID]){
    const r = USER_ROLES[MY_ID];
    roleBox.innerHTML = `<span style="color:${r.color};font-weight:800">${r.title}</span>`;
  } else roleBox.innerHTML = '';
  const isAdm = ADMIN_IDS.includes(Number(MY_ID));
  document.getElementById("admin-box").style.display = isAdm?"block":"none";
  document.getElementById("no-admin").style.display = isAdm?"none":"block";
  const savedAvatar = localStorage.getItem("user_avatar");
  if(savedAvatar) document.getElementById("p-avatar").style.backgroundImage = `url(${savedAvatar})`;
}

/* MOBILE KEYBOARD FIX */
window.addEventListener('resize',()=>{ 
  const scr = document.querySelector('.screen.active');
  if(scr) scr.scrollTop = scr.scrollHeight;
});

window.onload = ()=>{initTelegram(); updateUI(); loadHeroes();}
</script>
</body>
</html>
