<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakka AI</title>
<style>
/* Твой стиль (тот что прислал) */
</style>
</head>
<body>
<header id="h-title">HAKKA AI</header>
<div id="notif-container"></div>

<!-- ГЕРОИ -->
<div id="scr-heroes" class="screen active">
<input id="search-input" class="modern-input" placeholder="Поиск персонажа..." style="margin-bottom: 20px;">
<div id="hero-list"></div>
</div>

<!-- ЧАТ -->
<div id="scr-chat" class="screen">
<div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
<div onclick="nav('scr-heroes')" style="color:orange; font-weight: bold; cursor:pointer;">←</div>
<div id="chat-hero-name" style="font-weight: 800; font-size: 18px;">Чат</div>
<div onclick="clearChat()" style="color:#555; font-size: 12px; cursor:pointer;">Очистить</div>
</div>
<div id="chat-messages" class="chat-msgs"></div>
<div id="chat-input-box">
<input id="chat-input" class="modern-input" placeholder="Ваше сообщение...">
<button class="btn" onclick="sendMessage()">🚀</button>
</div>
</div>

<!-- ПРОФИЛЬ -->
<div id="scr-profile" class="screen">
<div class="profile-container">
<label class="avatar-wrapper">
<div id="p-avatar"></div>
<input type="file" id="avatar-upload" style="display:none" onchange="changeAvatar(event)">
</label>
<div class="profile-info-card">
<h2 id="my-id">ID: ---</h2>
<div id="user-role"></div>
<input id="user-nickname" class="modern-input" placeholder="Введите никнейм" onchange="saveNick(this.value)">
</div>
</div>
</div>

<!-- АДМИНКА -->
<div id="scr-admin" class="screen">
<div id="admin-box" style="display:none">
<input id="adm-name" class="modern-input" placeholder="Имя героя">
<textarea id="adm-desc" class="modern-input" placeholder="Описание/Промпт"></textarea>
<input type="file" id="adm-file" onchange="previewHeroImg(event)">
<div id="adm-prev" style="width:100%; height:120px; border-radius:20px; background-size:cover;"></div>
<button class="btn" onclick="saveHero()">Сохранить</button>
</div>
<div id="no-admin" style="text-align:center; margin-top: 50px;">🔒 Доступ ограничен</div>
</div>

<nav class="nav-bar">
<div class="nav-item active" onclick="nav('scr-heroes',this)">Персонажи</div>
<div class="nav-item" onclick="nav('scr-admin',this)">Создать</div>
<div class="nav-item" onclick="nav('scr-profile',this)">Профиль</div>
</nav>

<script>
const API_URL = "http://127.0.0.1:3000";
const USER_ROLES = {6625239442:{title:"Владелец",color:"#ff3b3b"},7652697216:{title:"Разработчик",color:"#3b8cff"}};
const ADMIN_IDS = Object.keys(USER_ROLES).map(Number);

let MY_ID = 0, heroes=[], currentHero=null, selectedIdx=null, tempImg="", typingElement=null;
let userName = localStorage.getItem("h_username") || "Пользователь";

// Уведомления
function showNotification(msg){
  const container = document.getElementById('notif-container');
  const toast = document.createElement('div');
  toast.className = 'toast'; toast.innerText = msg;
  container.appendChild(toast);
  setTimeout(()=>{ toast.remove(); },3000);
}

// Навигация
function nav(id, el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(el){
    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
  }
}

// Загрузка персонажей
async function loadHeroes(){
  try{
    const r = await fetch(`${API_URL}/api/characters`);
    heroes = await r.json();
    renderHeroes();
  }catch(e){console.log("offline");}
}

function renderHeroes(){
  const list = document.getElementById("hero-list");
  const isAdm = ADMIN_IDS.includes(MY_ID);
  list.innerHTML = heroes.map((h,i)=>`
    <div class="hero-card" onclick="openHero(${i})">
      <div class="hero-avatar" style="background-image:url(${h.img})"></div>
      <div class="hero-info"><b>${h.name}</b><small>${h.desc.substring(0,40)}...</small></div>
      ${isAdm?`<div onclick="event.stopPropagation(); editHero(${i})">✏️</div>`:""}
    </div>`).join("");
}

function openHero(i){
  selectedIdx=i;
  currentHero=heroes[i];
  document.getElementById("chat-hero-name").innerText=currentHero.name;
  nav("scr-chat");
  clearChat();
}

// Чат
async function sendMessage(){
  const inp=document.getElementById("chat-input");
  const txt=inp.value.trim();
  if(!txt||!currentHero) return;
  addMsg(txt,'user'); inp.value=''; showTyping();
  try{
    const r = await fetch(`${API_URL}/api/chat`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:txt,charName:currentHero.name,userId:MY_ID,userName})
    });
    const d = await r.json(); hideTyping(); addMsg(d.reply,'bot');
  }catch(e){ hideTyping(); addMsg("Ошибка AI",'bot'); }
}

function addMsg(t,s){
  const c=document.getElementById("chat-messages");
  const d=document.createElement("div");
  d.className=`bubble bubble-${s}`; d.innerText=t;
  c.appendChild(d); c.scrollTo({top:c.scrollHeight, behavior:'smooth'});
}

function showTyping(){
  const chat=document.getElementById("chat-messages");
  typingElement=document.createElement("div");
  typingElement.className="typing-bubble";
  typingElement.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(typingElement); chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){ if(typingElement) typingElement.remove(); }
function clearChat(){document.getElementById("chat-messages").innerHTML="";}
function saveNick(val){ localStorage.setItem("h_username",val); userName=val; showNotification("Ник обновлен!");}

// Админка
function previewHeroImg(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{tempImg=r.result; document.getElementById("adm-prev").style.backgroundImage=`url(${tempImg})`;}
  r.readAsDataURL(file);
}

async function saveHero(){
  const name=document.getElementById("adm-name").value;
  const desc=document.getElementById("adm-desc").value;
  if(!name||!tempImg) return showNotification("Заполните имя и картинку");
  const payload={adminId:MY_ID, character:{name,desc,img:tempImg}, index:selectedIdx};
  const r=await fetch(`${API_URL}/api/characters`,{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
  });
  const d=await r.json();
  if(d.success){ showNotification(`Персонаж ${name} добавлен!`);
    loadHeroes(); selectedIdx=null; document.getElementById("adm-name").value='';
    document.getElementById("adm-desc").value=''; document.getElementById("adm-prev").style.backgroundImage='';
    tempImg='';
  }else showNotification(d.error||"Ошибка добавления");
}

function editHero(i){
  const hero=heroes[i]; selectedIdx=i;
  document.getElementById("adm-name").value=hero.name;
  document.getElementById("adm-desc").value=hero.desc;
  tempImg=hero.img; document.getElementById("adm-prev").style.backgroundImage=`url(${hero.img})`;
  nav("scr-admin");
}

// Профиль
function changeAvatar(e){
  const r=new FileReader();
  r.onload=()=>{ localStorage.setItem("user_avatar",r.result);
    document.getElementById("p-avatar").style.backgroundImage=`url(${r.result})`;
    showNotification("Аватар сохранен!"); };
  r.readAsDataURL(e.target.files[0]);
}

function initTelegram(){
  const tg = window.Telegram?.WebApp;
  if(!tg) return;
  tg.ready(); tg.expand();
  if(tg.initDataUnsafe?.user){ MY_ID=tg.initDataUnsafe.user.id; userName=tg.initDataUnsafe.user.first_name||userName; }
  updateUI();
}

function updateUI(){
  document.getElementById("my-id").innerText=`ID: ${MY_ID}`;
  document.getElementById("user-nickname").value=userName;
  const isAdm = ADMIN_IDS.includes(MY_ID);
  document.getElementById("admin-box").style.display=isAdm?"block":"none";
  document.getElementById("no-admin").style.display=isAdm?"none":"block";
  const roleBox=document.getElementById("user-role");
  if(USER_ROLES[MY_ID]) roleBox.innerText=USER_ROLES[MY_ID].title;
  const savedAvatar = localStorage.getItem("user_avatar");
  if(savedAvatar) document.getElementById("p-avatar").style.backgroundImage=`url(${savedAvatar})`;
}

window.onload=()=>{ initTelegram(); loadHeroes(); };
</script>
</body>
</html>
